# Example: Deployment with custom CA certificates

global:
  imageRegistry: "kuberegistry.k8.cantrellcloud.net:8443/library"
  namespaceOverride: "toolbox"

image:
  repository: "k8s-ultimate-toolbox"
  tag: "v1.2.0"
  pullPolicy: IfNotPresent

serviceAccount:
  create: true
  name: ""

resources:
  requests:
    cpu: "100m"
    memory: "512Mi"
  limits:
    cpu: "2"
    memory: "3Gi"

customCA:
  enabled: true
  secretName: "toolbox-ca-certs"
  mountPath: /etc/ssl/custom-ca
  createSecret: false

# K8s Ultimate Toolbox Helm values

workspace:
  enabled: true
  # By default, /workspace is an ephemeral emptyDir.
  # Set storageClass to create a PVC for persistent diagnostics output.
  size: 10Gi
  storageClass: ""

global:
  # Optional registry prefix for offline/air-gapped environments.
  # Examples:
  #   - "myregistry.local:5000"
  #   - "altregistry.dev.kube:8443/library"
  #   - "harbor.internal/platform"
  imageRegistry: ""

  # Optional namespace override. Empty uses the Helm release namespace.
  namespaceOverride: ""

replicaCount: 1

image:
  repository: "k8s-ultimate-toolbox"
  tag: "v1.2.0"
  pullPolicy: IfNotPresent

imagePullSecrets: []
  # - name: regcred

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  name: ""
  annotations: {}

podAnnotations: {}
podLabels: {}

resources:
  requests:
    cpu: "100m"
    memory: "512Mi"
  limits:
    cpu: "2"
    memory: "3Gi"

nodeSelector: {}
tolerations: []
affinity: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 10000
  fsGroup: 10000

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
    add:
      # Required for ping, packet inspection, and network troubleshooting.
      - NET_ADMIN
      - NET_RAW
  readOnlyRootFilesystem: false

container:
  command: ["/bin/bash", "-c"]
  args:
    - |
      echo "==========================================";
      echo "K8s Ultimate Toolbox v1.2.0 Ready";
      echo "==========================================";
      echo "Pod Name: $HOSTNAME";
      echo "Namespace: ${POD_NAMESPACE:-default}";
      echo "";
      echo "Primary tool groups:";
      echo "  - Kubernetes: kubectl, helm, yq, jq";
      echo "  - Runtime/control-plane: crictl, etcdctl, etcdutl";
      echo "  - Identity: kcadm.sh, kcreg.sh, kc.sh, keycloak-login.sh";
      echo "  - Certificates/PKI: cmctl, step, openssl, certtool";
      echo "  - Policy/RBAC/upgrade: kubent, kubeconform, popeye, kubectl-who-can, rbac-lookup";
      echo "  - CNI: cilium, hubble, calicoctl";
      echo "  - PostgreSQL: psql, pg_isready, pg_dump, pg_restore, pgbench, pgcli, pg_activity, pgbadger, pg-diagnostics.sh";
      echo "  - MongoDB: mongosh, mongodump, mongorestore, mongoexport, mongoimport, mongostat, mongotop";
      echo "  - Storage: tridentctl, nfs-common, rsync, ssh";
      echo "  - Network/TLS: curl, wget, dig, nslookup, nc, nmap, tcpdump, traceroute, mtr, iperf3, socat, openssl";
      echo "";
      if [ -d /etc/ssl/custom-ca ] && [ "$(ls -A /etc/ssl/custom-ca 2>/dev/null)" ]; then
        echo "Custom CA certificates: loaded";
        ls /etc/ssl/custom-ca/*.crt 2>/dev/null | xargs -r -I {} basename {} | sed 's/^/  - /';
        echo "";
      fi
      echo "Access: kubectl -n ${POD_NAMESPACE:-default} exec -it $HOSTNAME -- bash";
      echo "==========================================";
      tail -f /dev/null

  env: []
    # PostgreSQL diagnostic example. Prefer Kubernetes Secrets for credentials.
    # - name: PGHOST
    #   value: "postgres.postgres.svc.cluster.local"
    # - name: PGPORT
    #   value: "5432"
    # - name: PGDATABASE
    #   value: "postgres"
    # - name: PGUSER
    #   valueFrom:
    #     secretKeyRef:
    #       name: postgres-admin
    #       key: username
    # Keycloak helper example. Keycloak CLI tools are installed in the default toolbox container.
    # - name: KEYCLOAK_URL
    #   value: "https://keycloak.example.com"
    # - name: KEYCLOAK_USER
    #   valueFrom:
    #     secretKeyRef:
    #       name: keycloak-admin
    #       key: username
    # - name: KEYCLOAK_SECRET
    #   valueFrom:
    #     secretKeyRef:
    #       name: keycloak-admin
    #       key: credential

  volumeMounts: []

volumes: []

livenessProbe:
  enabled: false
  exec:
    command:
      - /bin/bash
      - -c
      - "ps aux | grep -v grep | grep 'tail -f /dev/null'"
  initialDelaySeconds: 10
  periodSeconds: 30
  timeoutSeconds: 5
  successThreshold: 1
  failureThreshold: 3

readinessProbe:
  enabled: false
  exec:
    command:
      - /bin/bash
      - -c
      - "ps aux | grep -v grep | grep 'tail -f /dev/null'"
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 5
  successThreshold: 1
  failureThreshold: 3

# Custom CA Certificate Configuration
customCA:
  enabled: false
  secretName: "toolbox-ca-certs"
  mountPath: /etc/ssl/custom-ca
  createSecret: false
  certificates: []
    # - name: root-ca.crt
    #   content: |
    #     -----BEGIN CERTIFICATE-----
    #     ...
    #     -----END CERTIFICATE-----

# Ultimate K8s Toolbox Helm values

workspace:
  enabled: true
  # By default, /workspace is an ephemeral emptyDir.
  # Set storageClass to create a PVC for persistent diagnostics output.
  size: 10Gi
  storageClass: ""

global:
  # Optional registry prefix for offline/air-gapped environments.
  # Examples:
  #   - "myregistry.local:5000"
  #   - "altregistry.dev.kube:8443/library"
  #   - "harbor.internal/platform"
  imageRegistry: ""

  # Optional namespace override. Empty uses the Helm release namespace.
  namespaceOverride: ""

replicaCount: 1

image:
  repository: "ultimate-k8s-toolbox"
  tag: "v1.1.0"
  pullPolicy: IfNotPresent

imagePullSecrets: []
  # - name: regcred

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  name: ""
  annotations: {}

podAnnotations: {}
podLabels: {}

resources:
  requests:
    cpu: "50m"
    memory: "256Mi"
  limits:
    cpu: "2"
    memory: "2Gi"

nodeSelector: {}
tolerations: []
affinity: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 10000
  fsGroup: 10000

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
    add:
      # Required for ping, packet inspection, and network troubleshooting.
      - NET_ADMIN
      - NET_RAW
  readOnlyRootFilesystem: false

container:
  command: ["/bin/bash", "-c"]
  args:
    - |
      echo "==========================================";
      echo "Ultimate Kubernetes Toolbox v1.1.0 Ready";
      echo "==========================================";
      echo "Pod Name: $HOSTNAME";
      echo "Namespace: ${POD_NAMESPACE:-default}";
      echo "";
      echo "Primary tool groups:";
      echo "  - Kubernetes: kubectl, helm, yq, jq";
      echo "  - Identity: kcadm.sh, kcreg.sh, kc.sh, keycloak-login.sh";
      echo "  - PostgreSQL: psql, pg_isready, pg_dump, pg_restore, pgbench, pgcli, pg_activity, pgbadger, pg-diagnostics.sh";
      echo "  - MongoDB: mongosh, mongodump, mongorestore, mongoexport, mongoimport, mongostat, mongotop";
      echo "  - Storage: tridentctl, nfs-common, rsync, ssh";
      echo "  - Network/TLS: curl, wget, dig, nslookup, nc, nmap, tcpdump, traceroute, mtr, iperf3, socat, openssl";
      echo "";
      if [ -d /etc/ssl/custom-ca ] && [ "$(ls -A /etc/ssl/custom-ca 2>/dev/null)" ]; then
        echo "Custom CA certificates: loaded";
        ls /etc/ssl/custom-ca/*.crt 2>/dev/null | xargs -r -I {} basename {} | sed 's/^/  - /';
        echo "";
      fi
      echo "Access: kubectl -n ${POD_NAMESPACE:-default} exec -it $HOSTNAME -- bash";
      echo "==========================================";
      tail -f /dev/null

  env: []
    # PostgreSQL diagnostic example. Prefer secrets for credentials.
    # - name: PGHOST
    #   value: "postgres.postgres.svc.cluster.local"
    # - name: PGPORT
    #   value: "5432"
    # - name: PGDATABASE
    #   value: "postgres"
    # - name: PGUSER
    #   valueFrom:
    #     secretKeyRef:
    #       name: postgres-admin
    #       key: username
    # - name: PGPASSWORD
    #   valueFrom:
    #     secretKeyRef:
    #       name: postgres-admin
    #       key: password
    # Keycloak helper example:
    # - name: KEYCLOAK_URL
    #   value: "https://keycloak.example.com"
    # - name: KEYCLOAK_USER
    #   valueFrom:
    #     secretKeyRef:
    #       name: keycloak-admin
    #       key: username
    # - name: KEYCLOAK_PASSWORD
    #   valueFrom:
    #     secretKeyRef:
    #       name: keycloak-admin
    #       key: password

  volumeMounts: []

# Optional Keycloak CLI sidecar for environments where the main image cannot be rebuilt
# or where identity operations should be logically separated from the primary toolbox shell.
keycloakCli:
  enabled: false
  image:
    repository: "quay.io/keycloak/keycloak"
    tag: "26.6.3"
    pullPolicy: IfNotPresent
    fullImageOverride: ""
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: false
  command:
    - /bin/sh
    - -c
  args:
    - |
      echo "==========================================";
      echo "Keycloak CLI Sidecar Ready";
      echo "==========================================";
      echo "Available tools: kcadm.sh, kcreg.sh, kc.sh";
      echo "Access: kubectl -n ${POD_NAMESPACE:-default} exec -it $HOSTNAME -c keycloak-cli -- /bin/sh";
      tail -f /dev/null

volumes: []

livenessProbe:
  enabled: false
  exec:
    command:
      - /bin/bash
      - -c
      - "ps aux | grep -v grep | grep 'tail -f /dev/null'"
  initialDelaySeconds: 10
  periodSeconds: 30
  timeoutSeconds: 5
  successThreshold: 1
  failureThreshold: 3

readinessProbe:
  enabled: false
  exec:
    command:
      - /bin/bash
      - -c
      - "ps aux | grep -v grep | grep 'tail -f /dev/null'"
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 5
  successThreshold: 1
  failureThreshold: 3

# Custom CA Certificate Configuration
customCA:
  enabled: false
  secretName: "toolbox-ca-certs"
  mountPath: /etc/ssl/custom-ca
  createSecret: false
  certificates: []
    # - name: root-ca.crt
    #   content: |
    #     -----BEGIN CERTIFICATE-----
    #     ...
    #     -----END CERTIFICATE-----

{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "k8s-ultimate-toolbox.serviceAccountName" . }}
  namespace: {{ include "k8s-ultimate-toolbox.namespace" . }}
  labels:
    {{- include "k8s-ultimate-toolbox.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}

{{- if and .Values.workspace.enabled .Values.workspace.storageClass }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "k8s-ultimate-toolbox.fullname" . }}-workspace
  labels:
    {{- include "k8s-ultimate-toolbox.labels" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: {{ .Values.workspace.size | default "10Gi" }}
  storageClassName: {{ .Values.workspace.storageClass }}
{{- end }}

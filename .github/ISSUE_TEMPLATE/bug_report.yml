name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Current image and chart name: k8s-ultimate-toolbox.

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      placeholder: Describe the bug.
    validations:
      required: true

  - type: input
    id: toolbox-version
    attributes:
      label: Toolbox Version
      placeholder: "v1.2.0"
    validations:
      required: true

  - type: textarea
    id: values
    attributes:
      label: Helm Values
      render: yaml
      placeholder: |
        image:
          repository: k8s-ultimate-toolbox
          tag: "v1.2.0"
